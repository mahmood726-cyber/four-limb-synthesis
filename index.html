<!-- ============================================================
     SCRIPT 4b: Limb2 — Causal Transport & Distribution Matching (M11-M14)
     ============================================================ -->
<script>
/* === LIMB 2: CAUSAL TRANSPORT & DISTRIBUTION MATCHING === */
const Limb2 = (() => {
    const methods = {};

    // Helper: logistic regression via IRLS (iteratively reweighted least squares)
    // X: array of covariate vectors, y: binary outcome
    // Returns beta coefficients
    function logisticRegression(X, y, maxIter) {
        maxIter = maxIter || 25;
        const n = X.length, p = X[0].length;
        let beta = new Float64Array(p); // start at 0

        for (let iter = 0; iter < maxIter; iter++) {
            const mu = new Float64Array(n);
            const W = new Float64Array(n);
            for (let i = 0; i < n; i++) {
                let eta = 0;
                for (let j = 0; j < p; j++) eta += X[i][j] * beta[j];
                mu[i] = 1 / (1 + Math.exp(-eta));
                mu[i] = Math.max(1e-6, Math.min(1 - 1e-6, mu[i]));
                W[i] = mu[i] * (1 - mu[i]);
            }
            // X^T W X and X^T (y - mu)
            const XtWX = MathCore.linalg.zeros(p, p);
            const XtWz = new Float64Array(p);
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < p; j++) {
                    for (let k = 0; k < p; k++) {
                        const old = MathCore.linalg.get(XtWX, j, k);
                        MathCore.linalg.set(XtWX, j, k, old + X[i][j] * W[i] * X[i][k]);
                    }
                    XtWz[j] += X[i][j] * (y[i] - mu[i]);
                }
            }
            // Solve: (X^T W X) delta = X^T (y - mu)
            try {
                const delta = MathCore.linalg.solve(XtWX, XtWz);
                let maxDelta = 0;
                for (let j = 0; j < p; j++) {
                    beta[j] += delta[j];
                    maxDelta = Math.max(maxDelta, Math.abs(delta[j]));
                }
                if (maxDelta < 1e-8) break;
            } catch(e) {
                break; // Singular matrix, stop
            }
        }
        return beta;
    }

    // Helper: predict probabilities from logistic model
    function logisticPredict(X, beta) {
        return X.map(function(xi) {
            let eta = 0;
            for (let j = 0; j < xi.length; j++) eta += xi[j] * beta[j];
            return 1 / (1 + Math.exp(-eta));
        });
    }

    // Convert IPD to covariate matrix (with intercept)
    function ipdToX(ipd) {
        return ipd.map(function(row) { return [1, row.age_65, row.diabetes]; });
    }

    // M11: IPSW (Inverse Probability of Selection Weighting)
    methods.ipsw = function(trialIPD, targetIPD) {
        // Combined dataset: S=1 for trial, S=0 for target
        const Xtrial = ipdToX(trialIPD);
        const Xtarget = ipdToX(targetIPD);
        const Xall = Xtrial.concat(Xtarget);
        const Sall = new Float64Array(Xtrial.length + Xtarget.length);
        for (let i = 0; i < Xtrial.length; i++) Sall[i] = 1;

        // Fit P(S=1 | X) via logistic regression
        const beta = logisticRegression(Xall, Sall);
        const pScores = logisticPredict(Xtrial, beta);

        // IPSW weights: w_i = (1 - p_i) / p_i
        const rawWeights = pScores.map(function(p) { return (1 - p) / Math.max(p, 1e-6); });

        // Trim extreme weights (1st and 99th percentile)
        const sorted = Float64Array.from(rawWeights).sort();
        const lo = sorted[Math.floor(0.01 * sorted.length)];
        const hi = sorted[Math.floor(0.99 * sorted.length)];
        const weights = rawWeights.map(function(w) { return Math.max(lo, Math.min(hi, w)); });

        // Weighted ATE
        const sumW = weights.reduce(function(a, b) { return a + b; }, 0);
        let ate = 0;
        for (let i = 0; i < trialIPD.length; i++) {
            ate += weights[i] * trialIPD[i].yi;
        }
        ate /= sumW;

        return {
            ate_transported: ate,
            weights: weights,
            propensity_scores: pScores,
            beta: Array.from(beta)
        };
    };

    // M12: AIPW (Augmented Inverse Probability Weighting / Doubly Robust)
    methods.aipw = function(trialIPD, targetIPD) {
        // Step 1: Propensity model (same as IPSW)
        const Xtrial = ipdToX(trialIPD);
        const Xtarget = ipdToX(targetIPD);
        const Xall = Xtrial.concat(Xtarget);
        const Sall = new Float64Array(Xall.length);
        for (let i = 0; i < Xtrial.length; i++) Sall[i] = 1;
        const betaS = logisticRegression(Xall, Sall);
        const pScores = logisticPredict(Xtrial, betaS);

        // Step 2: Outcome model m(X) — OLS regression of yi on X (trial data only)
        const n = trialIPD.length;
        const p = Xtrial[0].length;
        const XtX = MathCore.linalg.zeros(p, p);
        const Xty = new Float64Array(p);
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < p; j++) {
                Xty[j] += Xtrial[i][j] * trialIPD[i].yi;
                for (let k = 0; k < p; k++) {
                    const old = MathCore.linalg.get(XtX, j, k);
                    MathCore.linalg.set(XtX, j, k, old + Xtrial[i][j] * Xtrial[i][k]);
                }
            }
        }
        let betaY;
        try {
            betaY = MathCore.linalg.solve(XtX, Xty);
        } catch(e) {
            betaY = new Float64Array(p);
        }

        // Predict m(X) for trial observations
        const mTrial = Xtrial.map(function(xi) {
            let pred = 0;
            for (let j = 0; j < p; j++) pred += xi[j] * betaY[j];
            return pred;
        });

        // Predict m(X) for target observations
        const mTarget = Xtarget.map(function(xi) {
            let pred = 0;
            for (let j = 0; j < p; j++) pred += xi[j] * betaY[j];
            return pred;
        });

        // AIPW doubly-robust estimator
        const targetMean = mTarget.reduce(function(a, b) { return a + b; }, 0) / mTarget.length;
        let augTerm = 0;
        for (let i = 0; i < n; i++) {
            const ps = Math.max(pScores[i], 1e-6);
            augTerm += ((1 - ps) / ps) * (trialIPD[i].yi - mTrial[i]);
        }
        augTerm /= n;
        const ate_dr = targetMean + augTerm;

        return {
            ate_dr: ate_dr,
            outcome_model_beta: Array.from(betaY),
            propensity_beta: Array.from(betaS),
            targetMean: targetMean,
            augmentation: augTerm
        };
    };

    // M13: Optimal Transport via Sinkhorn algorithm
    methods.sinkhorn = function(X, Y, epsilon, maxIter) {
        if (epsilon === undefined) epsilon = 0.1;
        if (maxIter === undefined) maxIter = 500;
        const m = X.length, n = Y.length;

        // Cost matrix C_ij = ||X_i - Y_j||^2
        const C = [];
        for (let i = 0; i < m; i++) {
            C[i] = new Float64Array(n);
            for (let j = 0; j < n; j++) {
                let d = 0;
                for (let kk = 0; kk < X[i].length; kk++) d += (X[i][kk] - Y[j][kk]) * (X[i][kk] - Y[j][kk]);
                C[i][j] = d;
            }
        }

        // Gibbs kernel K = exp(-C/epsilon)
        const K = [];
        for (let i = 0; i < m; i++) {
            K[i] = new Float64Array(n);
            for (let j = 0; j < n; j++) {
                K[i][j] = Math.exp(-C[i][j] / epsilon);
            }
        }

        // Uniform marginals
        const pMarg = new Float64Array(m).fill(1 / m);
        const qMarg = new Float64Array(n).fill(1 / n);

        // Sinkhorn iterations
        let a = new Float64Array(m).fill(1);
        let b = new Float64Array(n).fill(1);

        for (let iter = 0; iter < maxIter; iter++) {
            // a = p / (K * b)
            const aNew = new Float64Array(m);
            for (let i = 0; i < m; i++) {
                let s = 0;
                for (let j = 0; j < n; j++) s += K[i][j] * b[j];
                aNew[i] = pMarg[i] / Math.max(s, 1e-30);
            }
            a = aNew;

            // b = q / (K^T * a)
            const bNew = new Float64Array(n);
            for (let j = 0; j < n; j++) {
                let s = 0;
                for (let i = 0; i < m; i++) s += K[i][j] * a[i];
                bNew[j] = qMarg[j] / Math.max(s, 1e-30);
            }

            // Check convergence
            let maxDiff = 0;
            for (let j = 0; j < n; j++) maxDiff = Math.max(maxDiff, Math.abs(bNew[j] - b[j]));
            b = bNew;
            if (maxDiff < 1e-8) break;
        }

        // Transport plan: T_ij = a_i * K_ij * b_j
        const plan = [];
        let wasserstein = 0;
        for (let i = 0; i < m; i++) {
            plan[i] = new Float64Array(n);
            for (let j = 0; j < n; j++) {
                plan[i][j] = a[i] * K[i][j] * b[j];
                wasserstein += plan[i][j] * C[i][j];
            }
        }

        return {
            plan: plan,
            wasserstein: wasserstein,
            scaling_a: a,
            scaling_b: b
        };
    };

    // Transport effect using Sinkhorn plan
    methods.sinkhornTransport = function(trialIPD, targetIPD, epsilon) {
        if (epsilon === undefined) epsilon = 0.1;
        const X = trialIPD.map(function(r) { return [r.age_65, r.diabetes]; });
        const Y = targetIPD.map(function(r) { return [r.age_65, r.diabetes]; });
        const sinkResult = methods.sinkhorn(X, Y, epsilon);

        const m = trialIPD.length, n = targetIPD.length;
        const transportedEffects = new Float64Array(n);
        for (let j = 0; j < n; j++) {
            let wSum = 0, ySum = 0;
            for (let i = 0; i < m; i++) {
                wSum += sinkResult.plan[i][j];
                ySum += sinkResult.plan[i][j] * trialIPD[i].yi;
            }
            transportedEffects[j] = wSum > 1e-30 ? ySum / wSum : 0;
        }

        const ate = MathCore.stats.mean(Array.from(transportedEffects));

        return {
            ate_transported: ate,
            wasserstein: sinkResult.wasserstein,
            transportedEffects: transportedEffects,
            plan: sinkResult.plan
        };
    };

    // M14: MMD two-sample test using MathCore.kernel
    methods.mmdTest = function(X, Y, nPerm) {
        if (nPerm === undefined) nPerm = 200;
        const sigma = MathCore.kernel.medianBandwidth(X.concat(Y));
        const mmd2val = MathCore.kernel.mmd2(X, Y, sigma);
        const pValue = MathCore.kernel.mmdPermTest(X, Y, sigma, nPerm);

        return {
            mmd2: mmd2val,
            pValue: pValue,
            sigma: sigma,
            significant: pValue < 0.05
        };
    };

    // M15: Causal Transport via Do-Calculus
    methods.causalTransport = function(trialIPD, targetIPD, dag) {
        // Identify adjustment set via back-door criterion
        var adjResult = MathCore.graph.isIdentifiable(dag, 'treatment', 'outcome');
        var adjustmentSet = adjResult.adjustmentSet;

        // Map covariate names to IPD fields
        var covMap = {'age_65': 'age_65', 'diabetes': 'diabetes'};
        var adjustVars = adjustmentSet.filter(function(v) { return v in covMap; }).map(function(v) { return covMap[v]; });

        // Stratified estimation: P_target(Y|do(X)) = Σ_z P_trial(Y|X,Z=z) * P_target(Z=z)
        var nAdj = adjustVars.length;
        var strata = 1 << nAdj; // 2^nAdj for binary
        var ate = 0;
        var totalTargetWeight = 0;

        for (var s = 0; s < strata; s++) {
            // Decode stratum
            var stratumValues = {};
            for (var j = 0; j < nAdj; j++) {
                stratumValues[adjustVars[j]] = (s >> j) & 1;
            }

            // Trial observations in this stratum
            var trialInStratum = trialIPD.filter(function(row) {
                return adjustVars.every(function(v) { return row[v] === stratumValues[v]; });
            });

            // Target proportion in this stratum
            var targetInStratum = targetIPD.filter(function(row) {
                return adjustVars.every(function(v) { return row[v] === stratumValues[v]; });
            });
            var targetProp = targetInStratum.length / targetIPD.length;

            if (trialInStratum.length > 0 && targetProp > 0) {
                var stratumMean = MathCore.stats.mean(trialInStratum.map(function(r) { return r.yi; }));
                ate += stratumMean * targetProp;
                totalTargetWeight += targetProp;
            }
        }

        if (totalTargetWeight > 0) ate /= totalTargetWeight;

        return {
            ate_causal: ate,
            adjustmentSet: adjustVars,
            identifiable: true,
            nStrata: strata
        };
    };

    // M16: Knockoff Filter for Variable Selection
    methods.knockoffFilter = function(trialIPD, fdrTarget) {
        if (fdrTarget === undefined) fdrTarget = 0.2;
        var covNames = ['age_65', 'diabetes'];
        var n = trialIPD.length;
        var p = covNames.length;

        // Build X matrix and y vector
        var X = trialIPD.map(function(r) { return covNames.map(function(c) { return r[c]; }); });
        var y = trialIPD.map(function(r) { return r.yi; });

        // Generate knockoff copies: flip binary values with probability 0.3
        MathCore.random.seed(12345);
        var Xtilde = X.map(function(row) {
            return row.map(function(v) {
                return MathCore.random.uniform() < 0.3 ? (1 - v) : v;
            });
        });

        // Fit regression with both original and knockoff features
        var Xaug = X.map(function(row, i) { return [1].concat(row).concat(Xtilde[i]); });
        var pAug = Xaug[0].length;

        // OLS
        var XtX = MathCore.linalg.zeros(pAug, pAug);
        var Xty = new Float64Array(pAug);
        for (var i = 0; i < n; i++) {
            for (var j = 0; j < pAug; j++) {
                Xty[j] += Xaug[i][j] * y[i];
                for (var k = 0; k < pAug; k++) {
                    var old = MathCore.linalg.get(XtX, j, k);
                    MathCore.linalg.set(XtX, j, k, old + Xaug[i][j] * Xaug[i][k]);
                }
            }
        }

        // Add ridge penalty for stability
        for (var j2 = 0; j2 < pAug; j2++) {
            var old2 = MathCore.linalg.get(XtX, j2, j2);
            MathCore.linalg.set(XtX, j2, j2, old2 + 0.01);
        }

        var betaAug;
        try { betaAug = MathCore.linalg.solve(XtX, Xty); }
        catch(e) { betaAug = new Float64Array(pAug); }

        // Knockoff statistics: W_j = |beta_j| - |beta_j_tilde|
        var W = [];
        for (var jj = 0; jj < p; jj++) {
            var origCoef = Math.abs(betaAug[1 + jj]);
            var knockCoef = Math.abs(betaAug[1 + p + jj]);
            W.push(origCoef - knockCoef);
        }

        // Knockoff+ threshold
        var absW = W.map(Math.abs).sort(function(a, b) { return b - a; });
        var threshold = Infinity;
        for (var ti = 0; ti < absW.length; ti++) {
            var t = absW[ti];
            var numer = 1 + W.filter(function(w) { return w <= -t; }).length;
            var denom = Math.max(1, W.filter(function(w) { return w >= t; }).length);
            if (numer / denom <= fdrTarget) { threshold = t; break; }
        }

        var selected = covNames.filter(function(_, jjj) { return W[jjj] >= threshold; });

        return {
            importances: W,
            covariateNames: covNames,
            selected: selected,
            threshold: isFinite(threshold) ? threshold : null,
            fdrTarget: fdrTarget
        };
    };

    // M17: KLIEP Density Ratio Estimation
    methods.kliep = function(Xtrial, Xtarget, nBasis, maxIter) {
        if (nBasis === undefined) nBasis = 50;
        if (maxIter === undefined) maxIter = 100;
        var m = Xtrial.length, n = Xtarget.length;

        // Use a subset of target points as basis centers
        var nB = Math.min(nBasis, n);
        var centers = Xtarget.slice(0, nB);
        var sigma = MathCore.kernel.medianBandwidth(Xtrial.concat(Xtarget));

        // Compute basis functions for all target and trial points
        var A = []; // n x nB (target)
        for (var i = 0; i < n; i++) {
            A[i] = new Float64Array(nB);
            for (var l = 0; l < nB; l++) {
                A[i][l] = MathCore.kernel.rbf(Xtarget[i], centers[l], sigma);
            }
        }

        var B = []; // m x nB (trial)
        for (var ii = 0; ii < m; ii++) {
            B[ii] = new Float64Array(nB);
            for (var ll = 0; ll < nB; ll++) {
                B[ii][ll] = MathCore.kernel.rbf(Xtrial[ii], centers[ll], sigma);
            }
        }

        // Initialize alpha uniformly
        var alpha = new Float64Array(nB).fill(1 / nB);

        // Gradient ascent to maximize Σ_target log(r(x)) s.t. E_trial[r(x)] = 1
        var lr = 0.01;
        for (var iter = 0; iter < maxIter; iter++) {
            // r(x) = Σ_l alpha_l * φ_l(x)
            var rTarget = new Float64Array(n);
            for (var i2 = 0; i2 < n; i2++) {
                for (var l2 = 0; l2 < nB; l2++) rTarget[i2] += alpha[l2] * A[i2][l2];
                rTarget[i2] = Math.max(rTarget[i2], 1e-10);
            }

            // Gradient: Σ_target φ_l(x)/r(x) / n
            var grad = new Float64Array(nB);
            for (var l3 = 0; l3 < nB; l3++) {
                for (var i3 = 0; i3 < n; i3++) {
                    grad[l3] += A[i3][l3] / rTarget[i3];
                }
                grad[l3] /= n;
            }

            // Update alpha
            for (var l4 = 0; l4 < nB; l4++) {
                alpha[l4] += lr * grad[l4];
                if (alpha[l4] < 0) alpha[l4] = 0;
            }

            // Normalize so E_trial[r(x)] = 1
            var normConst = 0;
            for (var i4 = 0; i4 < m; i4++) {
                var ri = 0;
                for (var l5 = 0; l5 < nB; l5++) ri += alpha[l5] * B[i4][l5];
                normConst += ri;
            }
            normConst /= m;
            if (normConst > 1e-10) {
                for (var l6 = 0; l6 < nB; l6++) alpha[l6] /= normConst;
            }
        }

        // Compute final ratios for trial points
        var ratios = new Float64Array(m);
        for (var i5 = 0; i5 < m; i5++) {
            for (var l7 = 0; l7 < nB; l7++) ratios[i5] += alpha[l7] * B[i5][l7];
            ratios[i5] = Math.max(ratios[i5], 1e-10);
        }

        return { ratios: Array.from(ratios), alpha: Array.from(alpha), sigma: sigma };
    };

    // KLIEP-based transported effect
    methods.kliepTransport = function(trialIPD, targetIPD) {
        var X = trialIPD.map(function(r) { return [r.age_65, r.diabetes]; });
        var Y = targetIPD.map(function(r) { return [r.age_65, r.diabetes]; });
        var kliepRes = methods.kliep(X, Y);

        var sumW = kliepRes.ratios.reduce(function(a, b) { return a + b; }, 0);
        var ate = 0;
        for (var i = 0; i < trialIPD.length; i++) {
            ate += kliepRes.ratios[i] * trialIPD[i].yi;
        }
        ate /= sumW;

        return { ate_transported: ate, ratios: kliepRes.ratios };
    };

    // M18: Mapper Algorithm (TDA)
    methods.mapper = function(points, opts) {
        opts = opts || {};
        var nIntervals = opts.nIntervals !== undefined ? opts.nIntervals : 10;
        var overlap = opts.overlap !== undefined ? opts.overlap : 0.3;
        var nClusters = opts.nClusters !== undefined ? opts.nClusters : 3;
        var n = points.length;
        if (n === 0) return { nodes: [], edges: [] };

        // Filter function = dimension with max variance
        var dim = points[0].length;
        var mean = new Float64Array(dim);
        for (var pi = 0; pi < n; pi++) for (var d = 0; d < dim; d++) mean[d] += points[pi][d] / n;

        var variances = new Float64Array(dim);
        for (var pi2 = 0; pi2 < n; pi2++)
            for (var d2 = 0; d2 < dim; d2++) variances[d2] += (points[pi2][d2] - mean[d2]) * (points[pi2][d2] - mean[d2]);

        var maxDim = 0;
        for (var dd = 1; dd < dim; dd++) { if (variances[dd] > variances[maxDim]) maxDim = dd; }
        var filterVals = points.map(function(p) { return p[maxDim]; });

        // Cover range with overlapping intervals
        var fMin = filterVals.reduce(function(a,b) { return a < b ? a : b; }, filterVals[0]);
        var fMax = filterVals.reduce(function(a,b) { return a > b ? a : b; }, filterVals[0]);
        var range = fMax - fMin || 1;
        var intervalWidth = range / nIntervals * (1 + overlap);
        var step = range / nIntervals;

        var intervals = [];
        for (var ii = 0; ii < nIntervals; ii++) {
            var lo = fMin + ii * step - overlap * step / 2;
            var hi = lo + intervalWidth;
            intervals.push({lo: lo, hi: hi});
        }

        // Cluster within each interval
        var nodes = [];
        var nodeId = 0;
        var pointToNodes = [];
        for (var ppp = 0; ppp < n; ppp++) pointToNodes.push([]);

        for (var intIdx = 0; intIdx < intervals.length; intIdx++) {
            var interval = intervals[intIdx];
            var members = [];
            for (var mi = 0; mi < n; mi++) {
                if (filterVals[mi] >= interval.lo && filterVals[mi] <= interval.hi) members.push(mi);
            }
            if (members.length === 0) continue;

            var k = Math.min(nClusters, members.length);
            var sorted = members.slice().sort(function(a, b) { return filterVals[a] - filterVals[b]; });
            var clusterSize = Math.ceil(sorted.length / k);
            for (var c = 0; c < k; c++) {
                var clusterMembers = sorted.slice(c * clusterSize, (c + 1) * clusterSize);
                if (clusterMembers.length === 0) continue;
                var mfVals = clusterMembers.map(function(i) { return filterVals[i]; });
                var mf = MathCore.stats.mean(mfVals);
                var id = nodeId++;
                nodes.push({id: id, members: clusterMembers, meanFilter: mf, size: clusterMembers.length});
                for (var cm = 0; cm < clusterMembers.length; cm++) pointToNodes[clusterMembers[cm]].push(id);
            }
        }

        // Connect nodes sharing members
        var edges = [];
        var edgeSet = new Set();
        for (var eidx = 0; eidx < n; eidx++) {
            var nodeList = pointToNodes[eidx];
            for (var na = 0; na < nodeList.length; na++) {
                for (var nb = na + 1; nb < nodeList.length; nb++) {
                    var key = Math.min(nodeList[na], nodeList[nb]) + '-' + Math.max(nodeList[na], nodeList[nb]);
                    if (!edgeSet.has(key)) {
                        edgeSet.add(key);
                        edges.push({from: nodeList[na], to: nodeList[nb]});
                    }
                }
            }
        }

        return { nodes: nodes, edges: edges };
    };

    // ---- Visualization + DAG Editor ----

    const METHOD_LIST = [
        {id: 'distribution', label: 'Distribution Overlay'},
        {id: 'ipsw',         label: 'IPSW'},
        {id: 'aipw',         label: 'AIPW'},
        {id: 'sinkhorn',     label: 'Optimal Transport'},
        {id: 'mmd',          label: 'MMD Test'},
        {id: 'causal',       label: 'Causal DAG'},
        {id: 'knockoff',     label: 'Knockoff Filter'},
        {id: 'kliep',        label: 'KLIEP'},
        {id: 'mapper',       label: 'Mapper TDA'},
    ];

    let activeMethod = 'distribution';
    let currentResults = null;
    let dagState = {
        nodes: ['age_65', 'diabetes', 'treatment', 'outcome'],
        edges: [
            {from:'age_65',  to:'treatment'}, {from:'age_65',  to:'outcome'},
            {from:'diabetes',to:'treatment'}, {from:'diabetes',to:'outcome'},
            {from:'treatment',to:'outcome'}
        ]
    };

    function resetDAG() {
        dagState = {
            nodes: ['age_65', 'diabetes', 'treatment', 'outcome'],
            edges: [
                {from:'age_65',  to:'treatment'}, {from:'age_65',  to:'outcome'},
                {from:'diabetes',to:'treatment'}, {from:'diabetes',to:'outcome'},
                {from:'treatment',to:'outcome'}
            ]
        };
    }

    function init() {
        const bar = document.getElementById('limb2-methods');
        if (!bar) return;
        bar.innerHTML = '';
        for (const m of METHOD_LIST) {
            const btn = document.createElement('button');
            btn.className = 'method-btn' + (m.id === activeMethod ? ' active' : '');
            btn.textContent = m.label;
            btn.setAttribute('role', 'radio');
            btn.addEventListener('click', function() {
                activeMethod = m.id;
                bar.querySelectorAll('.method-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                render();
            });
            bar.appendChild(btn);
        }

        // DAG editor buttons
        const dagDefault = document.getElementById('dag-default');
        if (dagDefault) dagDefault.addEventListener('click', function() { resetDAG(); render(); });
        const dagClear = document.getElementById('dag-clear');
        if (dagClear) dagClear.addEventListener('click', function() {
            dagState = {nodes: [], edges: []};
            render();
        });

        onDataChange();
    }

    function onDataChange() {
        const limb1Results = typeof Limb1 !== 'undefined' ? Limb1.getResults() : null;
        if (!limb1Results) return;

        const ctx = DataLayer.getContextByRegion('North America', 2025);
        const pooledYi = limb1Results.reml.mu;
        const ipd = DataLayer.generateTransportIPD({yi: pooledYi}, ctx, 200, 200, 42);

        const trialX  = ipd.trialIPD.map(function(r) { return [r.age_65, r.diabetes]; });
        const targetX = ipd.targetIPD.map(function(r) { return [r.age_65, r.diabetes]; });

        // Run all transport methods
        const ipsw        = methods.ipsw(ipd.trialIPD, ipd.targetIPD);
        const aipw        = methods.aipw(ipd.trialIPD, ipd.targetIPD);
        const sinkhorn    = methods.sinkhornTransport(ipd.trialIPD, ipd.targetIPD, 0.1);
        const mmd         = methods.mmdTest(trialX, targetX, 100);
        const causal      = methods.causalTransport(ipd.trialIPD, ipd.targetIPD, dagState);
        const knockoff    = methods.knockoffFilter(ipd.trialIPD, 0.2);
        const kliep       = methods.kliepTransport(ipd.trialIPD, ipd.targetIPD);
        const mapperResult= methods.mapper(trialX.concat(targetX), {nIntervals: 8, overlap: 0.3});

        currentResults = {
            ipsw, aipw, sinkhorn, mmd, causal, knockoff, kliep, mapper: mapperResult,
            ipd, trialX, targetX, pooledYi, ctx
        };

        render();
    }

    function render() {
        if (!currentResults) return;
        const canvas = document.getElementById('limb2-canvas');
        if (!canvas) return;
        const ctx2d = (typeof canvas.getContext === 'function') ? canvas.getContext('2d') : null;
        const W = canvas.width || 900, H = canvas.height || 500;
        if (ctx2d) ctx2d.clearRect(0, 0, W, H);

        const title = document.getElementById('limb2-viz-title');

        switch (activeMethod) {
            case 'distribution':
                if (title) title.textContent = 'Covariate Distribution: Trial vs Target';
                drawDistribution(ctx2d, W, H);
                break;
            case 'ipsw': case 'aipw':
                if (title) title.textContent = activeMethod === 'ipsw' ? 'IPSW Propensity Weights' : 'AIPW Components';
                drawWeights(ctx2d, W, H);
                break;
            case 'sinkhorn':
                if (title) title.textContent = 'Optimal Transport Map (Sinkhorn)';
                drawTransportMap(ctx2d, W, H);
                break;
            case 'mmd':
                if (title) title.textContent = 'MMD Two-Sample Test (p=' + currentResults.mmd.pValue.toFixed(3) + ')';
                drawDistribution(ctx2d, W, H);
                break;
            case 'causal':
                if (title) title.textContent = 'Causal Transport via Do-Calculus';
                drawDAG();
                break;
            case 'knockoff':
                if (title) title.textContent = 'Knockoff Filter \u2014 Variable Importance';
                drawKnockoff(ctx2d, W, H);
                break;
            case 'kliep':
                if (title) title.textContent = 'KLIEP Density Ratio Weights';
                drawKLIEP(ctx2d, W, H);
                break;
            case 'mapper':
                if (title) title.textContent = 'Mapper Complex (TDA)';
                drawMapper(ctx2d, W, H);
                break;
        }

        updateComparisonTable();
        updateResultsTable();
    }

    function drawDistribution(ctx2d, W, H) {
        if (!ctx2d) return;
        const trialX = currentResults.trialX;
        const targetX = currentResults.targetX;
        const margin = {top: 30, right: 30, bottom: 50, left: 60};
        const pW = W - margin.left - margin.right;
        const pH = H - margin.top - margin.bottom;

        const trialPropAge  = trialX.filter(function(r)  { return r[0] === 1; }).length / trialX.length;
        const targetPropAge = targetX.filter(function(r) { return r[0] === 1; }).length / targetX.length;
        const trialPropDiab  = trialX.filter(function(r)  { return r[1] === 1; }).length / trialX.length;
        const targetPropDiab = targetX.filter(function(r) { return r[1] === 1; }).length / targetX.length;

        const barW = pW / 6;
        const maxP = Math.max(trialPropAge, targetPropAge, trialPropDiab, targetPropDiab, 0.3);

        function yScale(v) { return margin.top + (1 - v / maxP) * pH; }

        // Age 65+ bars
        ctx2d.fillStyle = '#4e8cff'; ctx2d.globalAlpha = 0.7;
        ctx2d.fillRect(margin.left + barW * 0.5, yScale(trialPropAge),  barW, pH - (yScale(trialPropAge)  - margin.top));
        ctx2d.fillStyle = '#fb923c';
        ctx2d.fillRect(margin.left + barW * 1.8, yScale(targetPropAge), barW, pH - (yScale(targetPropAge) - margin.top));

        // Diabetes bars
        ctx2d.fillStyle = '#4e8cff';
        ctx2d.fillRect(margin.left + barW * 3.5, yScale(trialPropDiab),  barW, pH - (yScale(trialPropDiab)  - margin.top));
        ctx2d.fillStyle = '#fb923c';
        ctx2d.fillRect(margin.left + barW * 4.8, yScale(targetPropDiab), barW, pH - (yScale(targetPropDiab) - margin.top));
        ctx2d.globalAlpha = 1;

        // Labels
        ctx2d.fillStyle = '#e0e6f0'; ctx2d.font = '12px sans-serif'; ctx2d.textAlign = 'center';
        ctx2d.fillText('Age 65+',  margin.left + barW * 1.3, H - 10);
        ctx2d.fillText('Diabetes', margin.left + barW * 4.3, H - 10);

        // Legend
        ctx2d.fillStyle = '#4e8cff'; ctx2d.fillRect(W - 160, 10, 12, 12);
        ctx2d.fillStyle = '#fb923c'; ctx2d.fillRect(W - 160, 28, 12, 12);
        ctx2d.fillStyle = '#e0e6f0'; ctx2d.textAlign = 'left'; ctx2d.font = '11px sans-serif';
        ctx2d.fillText('Trial',  W - 144, 21);
        ctx2d.fillText('Target', W - 144, 39);
    }

    function drawWeights(ctx2d, W, H) {
        if (!ctx2d) return;
        const weights = activeMethod === 'ipsw' ? currentResults.ipsw.weights : null;
        if (!weights) { drawDistribution(ctx2d, W, H); return; }

        const margin = {top: 30, right: 30, bottom: 50, left: 60};
        const pW = W - margin.left - margin.right;
        const pH = H - margin.top - margin.bottom;

        const maxW = Math.max.apply(null, weights);
        const n = weights.length;

        ctx2d.fillStyle = '#4e8cff';
        for (let i = 0; i < n; i++) {
            const x = margin.left + (i / n) * pW;
            const barH = (weights[i] / maxW) * pH;
            ctx2d.fillRect(x, margin.top + pH - barH, Math.max(1, pW / n - 1), barH);
        }

        ctx2d.fillStyle = '#e0e6f0'; ctx2d.font = '12px sans-serif'; ctx2d.textAlign = 'center';
        ctx2d.fillText('Observation Index', W / 2, H - 10);
        ctx2d.save(); ctx2d.translate(15, H / 2); ctx2d.rotate(-Math.PI / 2);
        ctx2d.fillText('IPSW Weight', 0, 0); ctx2d.restore();
    }

    function drawTransportMap(ctx2d, W, H) {
        if (!ctx2d) return;
        const trialX  = currentResults.trialX;
        const targetX = currentResults.targetX;
        const sinkhorn = currentResults.sinkhorn;
        const margin = {top: 30, right: 30, bottom: 50, left: 60};
        const pW = W - margin.left - margin.right;
        const pH = H - margin.top - margin.bottom;

        // Jitter binary covariates for visibility
        MathCore.random.seed(99);
        function jitter() { return MathCore.random.uniform() * 0.4 - 0.2; }

        // Trial points (blue, top half)
        ctx2d.fillStyle = '#4e8cff'; ctx2d.globalAlpha = 0.5;
        var trialPx = trialX.map(function(r) {
            return [
                margin.left + (r[0] * 0.7 + 0.15 + jitter() * 0.1) * pW,
                margin.top  + (0.2 + jitter() * 0.1) * pH
            ];
        });
        for (var i = 0; i < trialPx.length; i++) {
            ctx2d.beginPath(); ctx2d.arc(trialPx[i][0], trialPx[i][1], 3, 0, 2 * Math.PI); ctx2d.fill();
        }

        // Target points (orange, bottom half)
        ctx2d.fillStyle = '#fb923c';
        var targetPx = targetX.map(function(r) {
            return [
                margin.left + (r[0] * 0.7 + 0.15 + jitter() * 0.1) * pW,
                margin.top  + (0.7 + jitter() * 0.1) * pH
            ];
        });
        for (var j2 = 0; j2 < targetPx.length; j2++) {
            ctx2d.beginPath(); ctx2d.arc(targetPx[j2][0], targetPx[j2][1], 3, 0, 2 * Math.PI); ctx2d.fill();
        }
        ctx2d.globalAlpha = 1;

        // Top 100 transport connections (green lines)
        var plan = sinkhorn.plan;
        var m = trialX.length, n2 = targetX.length;
        var planFlat = [];
        for (var ii = 0; ii < m; ii++)
            for (var jj = 0; jj < n2; jj++)
                planFlat.push({i: ii, j: jj, w: plan[ii][jj]});
        planFlat.sort(function(a, b) { return b.w - a.w; });

        ctx2d.strokeStyle = '#34d399'; ctx2d.globalAlpha = 0.3; ctx2d.lineWidth = 0.5;
        for (var k2 = 0; k2 < Math.min(100, planFlat.length); k2++) {
            var pi = planFlat[k2].i, pj = planFlat[k2].j;
            ctx2d.beginPath();
            ctx2d.moveTo(trialPx[pi][0],  trialPx[pi][1]);
            ctx2d.lineTo(targetPx[pj][0], targetPx[pj][1]);
            ctx2d.stroke();
        }
        ctx2d.globalAlpha = 1;

        ctx2d.fillStyle = '#8892a8'; ctx2d.font = '11px sans-serif'; ctx2d.textAlign = 'left';
        ctx2d.fillText('W\u2082 = ' + sinkhorn.wasserstein.toFixed(4), margin.left + 10, margin.top + 20);

        ctx2d.fillStyle = '#4e8cff'; ctx2d.fillRect(W - 120, 10, 10, 10);
        ctx2d.fillStyle = '#fb923c'; ctx2d.fillRect(W - 120, 26, 10, 10);
        ctx2d.fillStyle = '#e0e6f0'; ctx2d.font = '10px sans-serif';
        ctx2d.fillText('Trial',  W - 106, 19);
        ctx2d.fillText('Target', W - 106, 35);
    }

    function drawDAG() {
        var svg = document.getElementById('limb2-dag-svg');
        if (!svg) return;

        var positions = {
            'age_65':    {x: 80,  y: 60},
            'diabetes':  {x: 320, y: 60},
            'treatment': {x: 200, y: 160},
            'outcome':   {x: 200, y: 280}
        };

        var adjustSet = (currentResults && currentResults.causal && currentResults.causal.adjustmentSet)
            ? new Set(currentResults.causal.adjustmentSet) : new Set();

        var svgHTML = '<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8892a8"/></marker></defs>';

        // Edges
        for (var ei = 0; ei < dagState.edges.length; ei++) {
            var e = dagState.edges[ei];
            var from = positions[e.from], to = positions[e.to];
            if (!from || !to) continue;
            var dx = to.x - from.x, dy = to.y - from.y;
            var len = Math.sqrt(dx * dx + dy * dy);
            var nx = dx / len, ny = dy / len;
            var x1 = from.x + nx * 25, y1 = from.y + ny * 25;
            var x2 = to.x   - nx * 25, y2 = to.y   - ny * 25;
            svgHTML += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="#8892a8" stroke-width="2" marker-end="url(#arrowhead)"/>';
        }

        // Nodes
        var nodeNames = Object.keys(positions);
        for (var ni = 0; ni < nodeNames.length; ni++) {
            var name = nodeNames[ni];
            var pos  = positions[name];
            var isAdj = adjustSet.has(name);
            var fill   = name === 'treatment' ? '#4e8cff' : name === 'outcome' ? '#34d399' : isAdj ? '#fbbf24' : '#1a2340';
            var stroke = isAdj ? '#fbbf24' : '#2a3555';
            svgHTML += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="24" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2"/>';
            svgHTML += '<text x="' + pos.x + '" y="' + (pos.y + 4) + '" text-anchor="middle" fill="#e0e6f0" font-size="10" font-family="sans-serif">' + name + '</text>';
        }

        svg.innerHTML = svgHTML;
    }

    function drawKnockoff(ctx2d, W, H) {
        if (!ctx2d) return;
        var knockoff = currentResults.knockoff;
        var margin = {top: 30, right: 30, bottom: 50, left: 120};
        var pW = W - margin.left - margin.right;
        var pH = H - margin.top - margin.bottom;

        var maxImp = Math.max.apply(null, knockoff.importances.map(Math.abs).concat([0.01]));

        for (var j = 0; j < knockoff.covariateNames.length; j++) {
            var y  = margin.top + (j + 0.5) / knockoff.covariateNames.length * pH;
            var w  = knockoff.importances[j];
            var barLen = (w / maxImp) * pW * 0.8;
            var isSelected = knockoff.selected.indexOf(knockoff.covariateNames[j]) !== -1;

            ctx2d.fillStyle = isSelected ? '#34d399' : (w >= 0 ? '#4e8cff' : '#f87171');
            if (w >= 0) {
                ctx2d.fillRect(margin.left, y - 15, barLen, 30);
            } else {
                ctx2d.fillRect(margin.left + barLen, y - 15, -barLen, 30);
            }

            ctx2d.fillStyle = '#e0e6f0'; ctx2d.textAlign = 'right'; ctx2d.font = '12px sans-serif';
            ctx2d.fillText(knockoff.covariateNames[j], margin.left - 10, y + 4);

            ctx2d.textAlign = 'left';
            ctx2d.fillText('W=' + w.toFixed(3) + (isSelected ? ' \u2713' : ''), margin.left + Math.abs(barLen) + 10, y + 4);
        }

        // FDR threshold line
        if (knockoff.threshold !== null) {
            var threshX = margin.left + (knockoff.threshold / maxImp) * pW * 0.8;
            ctx2d.strokeStyle = '#f87171'; ctx2d.lineWidth = 2; ctx2d.setLineDash([5, 3]);
            ctx2d.beginPath(); ctx2d.moveTo(threshX, margin.top); ctx2d.lineTo(threshX, H - margin.bottom);
            ctx2d.stroke(); ctx2d.setLineDash([]);
            ctx2d.fillStyle = '#f87171'; ctx2d.font = '10px sans-serif'; ctx2d.textAlign = 'left';
            ctx2d.fillText('FDR threshold', threshX + 4, margin.top + 14);
        }
    }

    function drawKLIEP(ctx2d, W, H) {
        if (!ctx2d) return;
        var ratios = currentResults.kliep.ratios;
        var margin = {top: 30, right: 30, bottom: 50, left: 60};
        var pW = W - margin.left - margin.right;
        var pH = H - margin.top - margin.bottom;

        var maxR = Math.max.apply(null, ratios);
        var n = ratios.length;

        for (var i = 0; i < n; i++) {
            var x = margin.left + (i / n) * pW;
            var barH = (ratios[i] / maxR) * pH;
            var hue = ratios[i] > 1.2 ? 0 : (ratios[i] < 0.8 ? 220 : 150);
            ctx2d.fillStyle = 'hsl(' + hue + ', 70%, 55%)';
            ctx2d.fillRect(x, margin.top + pH - barH, Math.max(1, pW / n - 1), barH);
        }

        // Reference line at r=1
        var refY = margin.top + pH - (1 / maxR) * pH;
        ctx2d.strokeStyle = '#fbbf24'; ctx2d.lineWidth = 2; ctx2d.setLineDash([4, 2]);
        ctx2d.beginPath(); ctx2d.moveTo(margin.left, refY); ctx2d.lineTo(W - margin.right, refY);
        ctx2d.stroke(); ctx2d.setLineDash([]);

        ctx2d.fillStyle = '#e0e6f0'; ctx2d.font = '12px sans-serif'; ctx2d.textAlign = 'center';
        ctx2d.fillText('Trial Observation', W / 2, H - 10);
    }

    function drawMapper(ctx2d, W, H) {
        if (!ctx2d) return;
        var mapper = currentResults.mapper;
        if (!mapper.nodes.length) return;

        var margin = {top: 30, right: 30, bottom: 30, left: 30};
        var pW = W - margin.left - margin.right;
        var pH = H - margin.top - margin.bottom;

        var nNodes = mapper.nodes.length;
        var cx = W / 2, cy = H / 2;
        var radius = Math.min(pW, pH) * 0.35;

        var nodePos = mapper.nodes.map(function(node, i) {
            return {
                x: cx + radius * Math.cos(2 * Math.PI * i / nNodes),
                y: cy + radius * Math.sin(2 * Math.PI * i / nNodes)
            };
        });

        // Edges
        ctx2d.strokeStyle = '#2a3555'; ctx2d.lineWidth = 1;
        for (var ei = 0; ei < mapper.edges.length; ei++) {
            var e = mapper.edges[ei];
            var from = nodePos[e.from], to = nodePos[e.to];
            if (from && to) {
                ctx2d.beginPath(); ctx2d.moveTo(from.x, from.y); ctx2d.lineTo(to.x, to.y); ctx2d.stroke();
            }
        }

        // Nodes
        var maxSize = Math.max.apply(null, mapper.nodes.map(function(nd) { return nd.size; }));
        for (var ni = 0; ni < nNodes; ni++) {
            var node = mapper.nodes[ni];
            var r = 5 + 15 * (node.size / maxSize);
            var hue = (200 + (node.meanFilter ?? 0) * 50) % 360;
            ctx2d.fillStyle = 'hsl(' + hue + ', 65%, 55%)';
            ctx2d.beginPath(); ctx2d.arc(nodePos[ni].x, nodePos[ni].y, r, 0, 2 * Math.PI); ctx2d.fill();
        }

        ctx2d.fillStyle = '#8892a8'; ctx2d.font = '11px sans-serif'; ctx2d.textAlign = 'left';
        ctx2d.fillText(nNodes + ' nodes, ' + mapper.edges.length + ' edges', margin.left + 10, H - 10);
    }

    function updateComparisonTable() {
        var el = document.getElementById('limb2-comparison-table');
        if (!el || !currentResults) return;
        var r = currentResults;
        el.innerHTML = '<table class="results-table">' +
            '<tr><th>Method</th><th>Transported ATE</th><th>RR</th></tr>' +
            '<tr><td>Naive (Limb 1)</td><td>' + r.pooledYi.toFixed(4) + '</td><td>' + Math.exp(r.pooledYi).toFixed(4) + '</td></tr>' +
            '<tr><td>IPSW</td><td>' + r.ipsw.ate_transported.toFixed(4) + '</td><td>' + Math.exp(r.ipsw.ate_transported).toFixed(4) + '</td></tr>' +
            '<tr><td>AIPW (Doubly Robust)</td><td>' + r.aipw.ate_dr.toFixed(4) + '</td><td>' + Math.exp(r.aipw.ate_dr).toFixed(4) + '</td></tr>' +
            '<tr><td>Sinkhorn OT</td><td>' + r.sinkhorn.ate_transported.toFixed(4) + '</td><td>' + Math.exp(r.sinkhorn.ate_transported).toFixed(4) + '</td></tr>' +
            '<tr><td>Causal (do-calculus)</td><td>' + r.causal.ate_causal.toFixed(4) + '</td><td>' + Math.exp(r.causal.ate_causal).toFixed(4) + '</td></tr>' +
            '<tr><td>KLIEP</td><td>' + r.kliep.ate_transported.toFixed(4) + '</td><td>' + Math.exp(r.kliep.ate_transported).toFixed(4) + '</td></tr>' +
            '</table>';
    }

    function updateResultsTable() {
        var el = document.getElementById('limb2-results');
        if (!el || !currentResults) return;
        var r = currentResults;
        el.innerHTML = '<table class="results-table" style="margin-top:12px;">' +
            '<tr><th>Diagnostic</th><th>Value</th></tr>' +
            '<tr><td>MMD\u00b2 (distributional shift)</td><td>' + r.mmd.mmd2.toFixed(6) + '</td></tr>' +
            '<tr><td>MMD p-value</td><td>' + r.mmd.pValue.toFixed(3) + ' ' + (r.mmd.significant ? '(significant)' : '(not significant)') + '</td></tr>' +
            '<tr><td>Wasserstein W\u2082</td><td>' + r.sinkhorn.wasserstein.toFixed(4) + '</td></tr>' +
            '<tr><td>Knockoff selected covariates</td><td>' + (r.knockoff.selected.length > 0 ? r.knockoff.selected.join(', ') : 'None (below FDR threshold)') + '</td></tr>' +
            '</table>';
    }

    function getResults() { return currentResults; }

    function exportCSV() {
        if (!currentResults) return;
        var r = currentResults;
        var csv = 'method,ate_transported,rr\n';
        csv += 'Naive,' + r.pooledYi + ',' + Math.exp(r.pooledYi) + '\n';
        csv += 'IPSW,' + r.ipsw.ate_transported + ',' + Math.exp(r.ipsw.ate_transported) + '\n';
        csv += 'AIPW,' + r.aipw.ate_dr + ',' + Math.exp(r.aipw.ate_dr) + '\n';

<!-- ============================================================
